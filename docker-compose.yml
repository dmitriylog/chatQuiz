services:
  chat:
    build: .
    restart: unless-stopped
    volumes:
      - chat-data:/app/data
    ports:
      - "127.0.0.1:8765:8765"

volumes:
  chat-data:
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/')"]
      interval: 30s
      timeout: 5s
      retries: 3
